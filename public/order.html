<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Checkout - The Cake Studio</title>
<meta name="description" content="Complete your cake order at The Cake Studio.">
<meta name="robots" content="noindex">

<link rel="icon" type="image/png" sizes="any" href="/images/logo.png">
<link rel="apple-touch-icon" href="/images/logo.png">
<meta name="theme-color" content="#e9779a">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand">
      <img src="/images/logo.png" alt="The Cake Studio" class="brand-logo">
      <div>
        <div class="brand-name">The Cake Studio</div>
        <div class="brand-sub">Checkout</div>
      </div>
    </a>
    <a href="/" class="btn-ghost">Back to Menu</a>
  </div>
</nav>

<div class="form-wrap">
  <div id="loginNotice" style="display:none;background:var(--primary-light);padding:14px 18px;border-radius:14px;margin-bottom:20px;font-size:13px;color:var(--text);border-left:4px solid var(--primary)">
    <strong>Tip:</strong> <button class="text-link" onclick="location.href='/'" style="font-weight:600">Login or create an account</button> to track this order and get updates.
  </div>

  <h2>Order Summary</h2>
  <div id="orderSummary" style="margin:14px 0 24px;background:var(--bg);padding:18px;border-radius:14px;border:1px solid var(--border)"></div>

  <h2>Delivery Details</h2>
  <div class="field">
    <label>Full Name *</label>
    <input id="customer_name" required>
  </div>
  <div class="row2">
    <div class="field">
      <label>Phone Number *</label>
      <input id="customer_phone" placeholder="03XX-XXXXXXX" required>
    </div>
    <div class="field">
      <label>City *</label>
      <select id="city" required>
        <option value="">Select city...</option>
        <option value="Hyderabad">Hyderabad</option>
      </select>
      <small style="color:var(--muted);font-size:11px">Currently we deliver in Hyderabad only.</small>
    </div>
  </div>
  <div class="field">
    <label>Complete Address *</label>
    <textarea id="customer_address" rows="3" placeholder="House #, Street, Area, Landmark" required></textarea>
  </div>
  <div class="row2">
    <div class="field">
      <label>Preferred Delivery Date</label>
      <input id="delivery_date" type="date">
    </div>
    <div class="field">
      <label>Special Notes (cake message, allergies, etc.)</label>
      <input id="notes">
    </div>
  </div>

  <h2 style="margin-top:20px">Payment Method</h2>
  <div class="field">
    <select id="payment_method" onchange="togglePayment()">
      <option value="">Select method...</option>
      <option value="EasyPaisa">EasyPaisa</option>
      <option value="Bank">Bank Transfer</option>
      <option value="COD">Cash on Delivery</option>
    </select>
  </div>

  <div id="paymentDetails" style="display:none">
    <div style="background:var(--bg);padding:14px;border-radius:12px;margin-bottom:14px;font-size:13px;border:1px solid var(--border)">
      <div id="paymentInfo"></div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Sender Name *</label>
        <input id="sender_name">
      </div>
      <div class="field">
        <label>Sender Number *</label>
        <input id="sender_number" placeholder="03XX-XXXXXXX">
      </div>
    </div>
    <div class="field">
      <label>Upload Payment Screenshot *</label>
      <input type="file" id="screenshot" accept="image/*">
      <small style="color:var(--muted);font-size:11px">JPG / PNG. Max 5MB.</small>
    </div>
  </div>

  <button class="btn-primary" id="placeBtn" onclick="placeOrder()">Place Order</button>
</div>

<div class="modal-overlay" id="feedbackModal">
  <div class="modal-box">
    <h2>Loved Our Service?</h2>
    <p style="text-align:center;color:var(--text-soft);font-size:13px;margin-bottom:14px">
      Share your experience with future customers
    </p>

    <div class="field">
      <label>Your Name</label>
      <input id="fb_name" placeholder="Display name for review">
    </div>

    <div class="field">
      <label>Rating</label>
      <div class="stars" id="starRow">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span>
        <span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>

    <div class="field">
      <label>Your Review</label>
      <textarea id="fb_msg" rows="3" placeholder="Tell us what you loved..."></textarea>
    </div>

    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn-ghost" style="flex:1;justify-content:center" onclick="closeFeedback()">Maybe Later</button>
      <button class="btn-primary" style="flex:1.5;margin:0" onclick="submitFeedback()">Submit Review</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/order.js"></script>
</body>
</html>
